name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Daily calls refresh"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # The daily refresh commits via GITHUB_TOKEN, and GitHub deliberately does
    # not let GITHUB_TOKEN-authored pushes trigger other workflows (anti-
    # recursion safeguard) — so the `push` trigger above never fires for that
    # bot commit. The `workflow_run` trigger is what actually redeploys the
    # site after each daily refresh; only do so if that refresh succeeded.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
